services:
  # --- The Database (Postgres) ---
  db:
    image: postgres:15-alpine
    container_name: todos_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: todos_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- The FastAPI App ---
  api:
    build: .
    container_name: todos_fastapi_app
    restart: always
    # VOLUME MOUNT: Maps local folder to container. Essential for 'Hot-Reloading'.
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      # Uses 'db' hostname for internal Docker networking
      - DATABASE_URL=postgresql://postgres:supersecretpassword@db:5432/todos_db
      - SECRET_KEY=freds-super-secret-jwt-key
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - PROJECT_NAME=Fred-Todos
      - PROJECT_VERSION=1.0.0
    # COMMAND OVERRIDE: Enables auto-reload inside the container for development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

volumes:
  postgres_data: