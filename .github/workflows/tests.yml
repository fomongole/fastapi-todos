name: Python Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Spin up a Postgres container in the cloud
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: supersecretpassword
          POSTGRES_DB: todos_db
        ports:
          - 5432:5432
        # Wait until postgres is ready before starting the tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11" # Using a stable version for CI

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx

    - name: Create .env file for tests
      run: |
        echo "PROJECT_NAME=Fred-Todos-CI" > .env
        echo "PROJECT_VERSION=1.0.0" >> .env
        echo "DATABASE_URL=postgresql://postgres:supersecretpassword@localhost:5432/todos_db" >> .env
        echo "SECRET_KEY=this-is-a-super-long-ci-test-key-for-jwt" >> .env
        echo "ALGORITHM=HS256" >> .env
        echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env

    - name: Run Pytest
      run: |
        pytest